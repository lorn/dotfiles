theme = "gruvbox_light"

[editor]
line-number = "relative"           # vim.opt.number
mouse = false                       # vim.opt.mouse = ''
auto-save = true                    # vim.opt.autowrite
scrolloff = 5
bufferline = "multiple"
color-modes = true
true-color = true
undercurl = true

[editor.statusline]
left = ["mode", "spinner", "file-name", "file-modification-indicator"]
right = ["diagnostics", "selections", "position", "file-encoding"]

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false                      # Show hidden files

[editor.search]
smart-case = true                   # vim.opt.smartcase = true
wrap-around = true

[editor.whitespace.render]
space = "none"
tab = "all"

[editor.indent-guides]
render = true
character = "│"

[editor.lsp]
display-messages = true
display-inlay-hints = true
snippets = true
goto-reference-include-declaration = false

[editor.soft-wrap]
enable = true                       # vim.opt.wrap = true

[editor.auto-pairs]
'(' = ')'
'{' = '}'
'[' = ']'
'"' = '"'
"'" = "'"
"`" = "`"

[keys.normal]
# Keep defaults, minimal changes
C-s = ":w"                          # Quick save alternative
# Vim-style line navigation
"0" = "goto_line_start"
"$" = "goto_line_end"
"^" = "goto_first_nonwhitespace"
# Vim-style file navigation
G = "goto_file_end"
